<body class="bg-slate-950 text-slate-100 antialiased">

          </div>
          <button id="navToggle" type="button" class="rounded-lg border border-white/10 bg-white/5 px-3 py-1.5 text-sm text-slate-100 hover:bg-white/10">

              <div class="text-sm font-semibold tracking-wide text-slate-100">个人笔记</div>
            </div>

            <details class="nav-group" open>
              <summary class="nav-group-title">Python</summary>
              <nav class="mt-2 space-y-1">
                <a class="nav-link" data-src="page/Python.html" href="page/Python.html">Python 基础与进阶</a>
              </nav>
            </details>

            <details class="nav-group" open>
              <summary class="nav-group-title">数据库</summary>
              <nav class="mt-2 space-y-1">
                <a class="nav-link" data-src="page/Postgresql.html" href="page/Postgresql.html">PostgreSQL 高频面试</a>
                <a class="nav-link" data-src="page/Redis.html" href="page/Redis.html">Redis 高频面试</a>
              </nav>

            <details class="nav-group" open>
              <summary class="nav-group-title">后端</summary>
              <nav class="mt-2 space-y-1">
                <a class="nav-link" data-src="page/Fastapi.html" href="page/Fastapi.html">FastAPI 体系</a>
                <a class="nav-link" data-src="page/celery-lifecycle.html" href="page/celery-lifecycle.html">Celery 生命周期</a>

        <!-- Resizer -->
        <div class="hidden md:block">

            id="splitter"
            class="group relative h-screen w-px bg-white/10"
            role="separator"
            aria-orientation="vertical"
            aria-label="Resize sidebar"
            tabindex="0"

            <div class="absolute inset-y-0 -left-1 -right-1 cursor-col-resize"></div>

          <div class="absolute left-0 top-0 h-full w-[86vw] max-w-sm border-r border-white/10 bg-slate-950 shadow-soft">
            <div class="flex items-center justify-between border-b border-white/10 px-4 py-3">
              <div class="text-sm font-semibold tracking-wide text-slate-100">导航</div>
              <button id="drawerClose" type="button" class="rounded-lg border border-white/10 bg-white/5 px-3 py-1.5 text-sm text-slate-100 hover:bg-white/10">
                关闭
              </button>
            </div>
            <div class="px-4 py-4">
              <details class="nav-group" open>
                <summary class="nav-group-title">Python</summary>
                <nav class="mt-2 space-y-1">
                  <a class="nav-link" data-src="page/Python.html" href="page/Python.html">Python 基础与进阶</a>
                </nav>
              </details>
              <details class="nav-group" open>
                <summary class="nav-group-title">数据库</summary>
                <nav class="mt-2 space-y-1">
                  <a class="nav-link" data-src="page/Postgresql.html" href="page/Postgresql.html">PostgreSQL 高频面试</a>
                  <a class="nav-link" data-src="page/Redis.html" href="page/Redis.html">Redis 高频面试</a>
                </nav>
              </details>
              <details class="nav-group" open>
                <summary class="nav-group-title">后端</summary>
                <nav class="mt-2 space-y-1">
                  <a class="nav-link" data-src="page/Fastapi.html" href="page/Fastapi.html">FastAPI 体系</a>
                  <a class="nav-link" data-src="page/celery-lifecycle.html" href="page/celery-lifecycle.html">Celery 生命周期</a>

            </div>

        <!-- Content -->
        <main class="min-w-0 flex-1">
          <div class="h-[calc(100vh-0px)] px-0 py-0 md:px-0 md:py-0">
            <iframe
              id="contentFrame"

  <style>
    .nav-group {
      margin-top: 14px;
    }

    .nav-group:first-of-type {
      margin-top: 0;
    }

    .nav-group-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      list-style: none;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(148, 163, 184, 0.95);
      padding: 6px 6px;
      border-radius: 10px;
    }

    .nav-group-title::-webkit-details-marker {
      display: none;
    }

    .nav-group-title::after {
      content: "▾";
      font-size: 14px;
      line-height: 1;
      color: rgba(148, 163, 184, 0.9);
      transform: rotate(0deg);
      transition: transform 180ms ease, color 150ms ease, translate 150ms ease;
    }

    details.nav-group:not([open]) > .nav-group-title::after {
      transform: rotate(-90deg);
    }

    .nav-group-title:hover::after {
      color: rgba(226, 232, 240, 0.95);
      translate: 0 -1px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border-radius: 10px;
      background: transparent;
      color: rgba(226, 232, 240, 0.92);
      font-size: 12px;
      line-height: 1.25;
      transition: background 140ms ease, color 140ms ease, transform 140ms ease;
      position: relative;
    }
    .nav-link:hover {
      background: rgba(255, 255, 255, 0.06);
      transform: translateY(-1px);
    }
    .nav-link[data-active="true"] {
      background: rgba(255, 255, 255, 0.06);
      color: rgba(226, 232, 240, 1);
    }

    .nav-link[data-active="true"]::before {
      content: "";
      position: absolute;
      left: 6px;
      top: 50%;
      transform: translateY(-50%);
      width: 2px;
      height: 16px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.9);
      box-shadow: 0 0 14px rgba(56, 189, 248, 0.25);
    }
  </style>

  <script>
    const frame = document.getElementById("contentFrame");
    const navLinks = Array.from(document.querySelectorAll(".nav-link"));
    const splitRoot = document.getElementById("splitRoot");
    const splitter = document.getElementById("splitter");
    const sidebar = document.getElementById("sidebar");

    function setActiveBySrc(src) {
      for (const a of navLinks) {
        const isActive = a.getAttribute("data-src") === src;
        a.dataset.active = isActive ? "true" : "false";
      }
    }

    function navigate(a) {
      const src = a.getAttribute("data-src") || a.getAttribute("href");
      frame.src = src;
      setActiveBySrc(src);
    }

    for (const a of navLinks) {
      a.addEventListener("click", (e) => {
        // Keep it working even under file:// by using iframe navigation.
        e.preventDefault();
        navigate(a);
        closeDrawer();
      });
    }

    // Initial active state
    setActiveBySrc(frame.getAttribute("src"));

    function cleanupLoadedPage() {
      try {
        const doc = frame.contentDocument;
        if (!doc) return;
        doc.querySelectorAll(".page-updated").forEach((el) => el.remove());
      } catch (_) {
        // ignore cross-origin/permission issues
      }
    }

    frame.addEventListener("load", cleanupLoadedPage);

    // Split-pane resizing (desktop)
    (function initSplitPane() {
      if (!splitRoot || !splitter || !sidebar) return;

      const MIN = 200;
      const MAX = 460;
      const KEY = "notes.sidebarWidth";

      function clamp(n) {
        return Math.max(MIN, Math.min(MAX, n));
      }

      function applyWidth(px) {
        const w = clamp(px);
        splitRoot.style.setProperty("--sidebar-w", `${w}px`);
        try { localStorage.setItem(KEY, String(w)); } catch (_) {}
      }

      try {
        const saved = Number(localStorage.getItem(KEY));
        if (Number.isFinite(saved) && saved > 0) applyWidth(saved);
      } catch (_) {}

      let dragging = false;

      function pointerDown(e) {
        dragging = true;
        splitter.setPointerCapture?.(e.pointerId);
        document.body.style.userSelect = "none";
        document.body.style.cursor = "col-resize";
      }

      function pointerMove(e) {
        if (!dragging) return;
        const rect = splitRoot.getBoundingClientRect();
        const next = e.clientX - rect.left;
        applyWidth(next);
      }

      function pointerUp(e) {
        if (!dragging) return;
        dragging = false;
        splitter.releasePointerCapture?.(e.pointerId);
        document.body.style.userSelect = "";
        document.body.style.cursor = "";
      }

      splitter.addEventListener("pointerdown", pointerDown);
      window.addEventListener("pointermove", pointerMove);
      window.addEventListener("pointerup", pointerUp);

      splitter.addEventListener("keydown", (e) => {
        const current = sidebar.getBoundingClientRect().width;
        if (e.key === "ArrowLeft") applyWidth(current - 16);
        if (e.key === "ArrowRight") applyWidth(current + 16);
      });
    })();

    // Mobile drawer
    const navToggle = document.getElementById("navToggle");
    const drawer = document.getElementById("mobileDrawer");
    const drawerClose = document.getElementById("drawerClose");
    const drawerBackdrop = document.getElementById("drawerBackdrop");

    function openDrawer() {
      if (!drawer) return;
      drawer.classList.remove("hidden");
      document.body.style.overflow = "hidden";
    }
    function closeDrawer() {
      if (!drawer) return;
      drawer.classList.add("hidden");
      document.body.style.overflow = "";
    }

    if (navToggle) navToggle.addEventListener("click", openDrawer);
    if (drawerClose) drawerClose.addEventListener("click", closeDrawer);
    if (drawerBackdrop) drawerBackdrop.addEventListener("click", closeDrawer);
  </script>
</body>
</html>
