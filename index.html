            <nav class="mt-2 space-y-1">

            <div class="mt-5 text-xs font-semibold uppercase tracking-wider text-slate-400">后端框架与分布式</div>

              <nav class="mt-2 space-y-1">
                <a class="nav-link" data-src="page/Python.html" href="page/Python.html">Python 基础与进阶</a>
                <a class="nav-link" data-src="page/Postgresql.html" href="page/Postgresql.html">PostgreSQL 高频面试</a>
                <a class="nav-link" data-src="page/Redis.html" href="page/Redis.html">Redis 高频面试</a>

              <div class="mt-5 text-xs font-semibold uppercase tracking-wider text-slate-400">后端框架与分布式</div>
              <nav class="mt-2 space-y-1">

        <!-- Content -->
        <main class="min-w-0">
          <div class="px-3 py-3 md:px-6 md:py-5">
            <div class="flex items-center justify-between">
              <div class="min-w-0">
                <div class="text-xs font-medium text-slate-400">当前专题</div>
                <div id="currentTitle" class="truncate text-sm font-semibold tracking-wide text-slate-100">Python 基础与进阶</div>
              </div>
              <a id="openInNewTab" class="rounded-lg border border-white/10 bg-white/5 px-3 py-1.5 text-xs font-medium text-slate-100 hover:bg-white/10" href="page/Python.html" target="_blank" rel="noreferrer">

          <div class="px-3 pb-4 md:px-6 md:pb-6">
            <div class="rounded-xl border border-white/10 bg-white/[0.03] shadow-soft">
              <iframe
                id="contentFrame"
                title="content"
                class="h-[calc(100vh-140px)] w-full rounded-xl bg-slate-900"
                src="page/Python.html"

  <style>
    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 10px;
      border-radius: 10px;
      border: 1px solid transparent;
      background: transparent;
      color: rgba(226, 232, 240, 0.92);
      font-size: 13px;
      line-height: 1.25;
      transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
    }
    .nav-link:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.08);
    }
    .nav-link[data-active="true"] {
      background: rgba(56, 189, 248, 0.12);
      border-color: rgba(56, 189, 248, 0.24);
      color: rgba(226, 232, 240, 1);
    }
  </style>

  <script>
    const frame = document.getElementById("contentFrame");
    const currentTitle = document.getElementById("currentTitle");
    const openInNewTab = document.getElementById("openInNewTab");
    const navLinks = Array.from(document.querySelectorAll(".nav-link"));

    function setActiveBySrc(src) {
      for (const a of navLinks) {
        const isActive = a.getAttribute("data-src") === src;
        a.dataset.active = isActive ? "true" : "false";
      }
    }

    function navigate(a) {
      const src = a.getAttribute("data-src") || a.getAttribute("href");
      const title = (a.textContent || "").trim() || "专题";
      frame.src = src;
      currentTitle.textContent = title;
      openInNewTab.href = src;
      setActiveBySrc(src);
    }

    for (const a of navLinks) {
      a.addEventListener("click", (e) => {
        // Keep it working even under file:// by using iframe navigation.
        e.preventDefault();
        navigate(a);
        closeDrawer();
      });
    }

    // Initial active state
    setActiveBySrc(frame.getAttribute("src"));

    // Mobile drawer
    const navToggle = document.getElementById("navToggle");
    const drawer = document.getElementById("mobileDrawer");
    const drawerClose = document.getElementById("drawerClose");
    const drawerBackdrop = document.getElementById("drawerBackdrop");

    function openDrawer() {
      if (!drawer) return;
      drawer.classList.remove("hidden");
      document.body.style.overflow = "hidden";
    }
    function closeDrawer() {
      if (!drawer) return;
      drawer.classList.add("hidden");
      document.body.style.overflow = "";
    }

    if (navToggle) navToggle.addEventListener("click", openDrawer);
    if (drawerClose) drawerClose.addEventListener("click", closeDrawer);
    if (drawerBackdrop) drawerBackdrop.addEventListener("click", closeDrawer);
  </script>
</body>
</html>
