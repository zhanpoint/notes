  <style>
    html, body {
      transition: background-color 180ms ease, color 180ms ease;

    #sidebarNav {
      scrollbar-width: thin;
      scrollbar-color: rgba(148, 163, 184, 0.7) transparent;
    }

    #sidebarNav::-webkit-scrollbar {

    }
    #sidebarNav::-webkit-scrollbar-track {

    }
    #sidebarNav::-webkit-scrollbar-thumb {

      border-radius: 999px;
    }

    #drawerNav {
      scrollbar-width: thin;
      scrollbar-color: rgba(148, 163, 184, 0.7) transparent;

    }

      background: transparent;
    }
    #drawerNav::-webkit-scrollbar-thumb {

    html[data-theme="light"] body {

      color: #334155;
    }

    html[data-theme="light"] header.sticky {

    }

    html[data-theme="light"] #sidebar,
    html[data-theme="light"] #drawerPanel,
    html[data-theme="light"] #drawerPanel > div:first-child {
      border-color: rgba(15, 23, 42, 0.14);
    }

    /* Light mode: make divider lines inside panels visible */
    html[data-theme="light"] #sidebar .border-b,
    html[data-theme="light"] #drawerPanel .border-b {
      border-color: rgba(15, 23, 42, 0.16) !important;
    }

    html[data-theme="light"] #drawerPanel {
      background: #faf9f5;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.12);
    }

    html[data-theme="light"] #frameMask {
      background: #faf9f5;
    }

    html[data-theme="light"] #splitter {
      background: rgba(15, 23, 42, 0.14);
    }

    html[data-theme="light"] .text-slate-100,
    html[data-theme="light"] .text-slate-200,
    html[data-theme="light"] .text-slate-300 {
      color: rgb(51 65 85 / 1) !important;
    }

    .nav-group {
      margin-top: 14px;
    }

    .nav-group:first-of-type {
      margin-top: 0;
    }

    .nav-group-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      list-style: none;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: rgba(148, 163, 184, 0.95);
      padding: 6px 6px;
      border-radius: 10px;
    }

    .nav-group-title::-webkit-details-marker {
      display: none;
    }

    .nav-group-title::after {
      content: "▾";
      font-size: 14px;
      line-height: 1;
      color: rgba(148, 163, 184, 0.9);
      transform: rotate(0deg);
      transition: transform 180ms ease, color 150ms ease, translate 150ms ease;
    }

    details.nav-group:not([open]) > .nav-group-title::after {
      transform: rotate(-90deg);
    }

    .nav-group-title:hover::after {
      color: rgba(226, 232, 240, 0.95);
      translate: 0 -1px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border-radius: 10px;
      background: transparent;
      color: rgba(226, 232, 240, 0.92);
      font-size: 12px;
      line-height: 1.25;
      transition: background 140ms ease, color 140ms ease, transform 140ms ease;
      position: relative;
    }
    .nav-link:hover {
      background: rgba(255, 255, 255, 0.06);
      transform: translateY(-1px);
    }
    .nav-link[data-active="true"] {
      background: rgba(255, 255, 255, 0.06);
      color: rgba(226, 232, 240, 1);
    }

    .nav-link[data-active="true"]::before {
      content: "";
      position: absolute;
      left: 6px;
      top: 50%;
      transform: translateY(-50%);
      width: 2px;
      height: 16px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.9);
      box-shadow: 0 0 14px rgba(56, 189, 248, 0.25);
    }

    html[data-theme="light"] .nav-group-title {
      color: rgba(71, 85, 105, 0.96);
    }

    html[data-theme="light"] .nav-group-title::after {
      color: rgba(71, 85, 105, 0.9);
    }

    html[data-theme="light"] .nav-link {
      color: rgba(30, 41, 59, 0.92);
    }

    html[data-theme="light"] .nav-link:hover,
    html[data-theme="light"] .nav-link[data-active="true"] {
      background: rgba(15, 23, 42, 0.06);
      color: rgba(30, 41, 59, 1);
    }
  </style>

  <script>
    const frame = document.getElementById("contentFrame");
    const navLinks = Array.from(document.querySelectorAll(".nav-link"));
    const splitRoot = document.getElementById("splitRoot");
    const splitter = document.getElementById("splitter");
    const sidebar = document.getElementById("sidebar");
    const themeToggle = document.getElementById("themeToggle");
    const frameMask = document.getElementById("frameMask");
    let activeNavTitle = "";
    const LAST_PAGE_KEY = "notes.lastPage";
    const THEME_KEY = "notes.theme";
    const NAV_GROUPS_KEY = "notes.navGroupsOpen.v1";

    function readNavGroupState(root) {
      const state = {};
      if (!root) return state;
      root.querySelectorAll("details.nav-group").forEach((d) => {
        const t = d.querySelector(".nav-group-title")?.textContent?.trim() || "";
        if (t) state[t] = d.open;
      });
      return state;
    }

    function applyNavGroupState(state) {
      ["#sidebarNav", "#drawerNav"].forEach((sel) => {
        const r = document.querySelector(sel);
        if (!r) return;
        r.querySelectorAll("details.nav-group").forEach((d) => {
          const t = d.querySelector(".nav-group-title")?.textContent?.trim() || "";
          if (t && Object.prototype.hasOwnProperty.call(state, t)) d.open = !!state[t];
        });
      });
    }

    function persistNavGroupState() {
      try {
        const state = readNavGroupState(document.getElementById("sidebarNav"));
        if (Object.keys(state).length) localStorage.setItem(NAV_GROUPS_KEY, JSON.stringify(state));
      } catch (_) {}
    }

    function restoreNavGroupState() {
      try {
        const raw = localStorage.getItem(NAV_GROUPS_KEY);
        if (!raw) return;
        const state = JSON.parse(raw);
        if (!state || typeof state !== "object") return;
        applyNavGroupState(state);
      } catch (_) {}
    }

    function onNavGroupToggle(e) {
      const detailsEl = e.target;
      if (!(detailsEl instanceof HTMLDetailsElement) || !detailsEl.matches("details.nav-group")) return;
      const root = detailsEl.closest("#sidebarNav, #drawerNav");
      if (!root) return;
      const state = readNavGroupState(root);
      applyNavGroupState(state);
      persistNavGroupState();
    }

    function normalizeSrc(src) {
      try {
        const u = new URL(src, window.location.href);
        return `${u.pathname}${u.search}${u.hash}`;
      } catch (_) {
        return src || "";
      }
    }

    function applyThemeToFrame(theme) {
      try {
        const doc = frame.contentDocument;
        if (!doc) return;
        const bg = theme === "light" ? "#faf9f5" : "#2f3348";
        doc.documentElement.style.backgroundColor = bg;
        doc.body.style.backgroundColor = bg;
        const STYLE_ID = "notes-host-theme-override";
        let styleEl = doc.getElementById(STYLE_ID);
        if (!styleEl) {
          styleEl = doc.createElement("style");
          styleEl.id = STYLE_ID;
          doc.head?.appendChild(styleEl);
        }
        if (theme === "light") {
          styleEl.textContent = `
            html, body { color: #334155 !important; background: #faf9f5 !important; }
            .text-slate-100, .text-slate-200, .text-slate-300, .text-slate-400 { color: #334155 !important; }
            .content p, .content li, .content code, .content td, .content th { color: #334155 !important; }
            .content pre { background: #f3f0e7 !important; color: #334155 !important; border-color: rgba(15,23,42,0.12) !important; }
            .content code { background: #f3f0e7 !important; border-color: rgba(15,23,42,0.12) !important; }
            .content details, .qa-list > details, .content table, details { border-color: rgba(15,23,42,0.2) !important; }
            .qa-list > details > summary::after { color: rgba(51,65,85,0.92) !important; }
          `;
        } else {
          styleEl.textContent = "";
        }
      } catch (_) {}
    }

    function setThemeIcon(theme) {
      if (!themeToggle) return;
      if (theme === "light") {
        themeToggle.title = "切换深色主题";
        themeToggle.setAttribute("aria-label", "切换深色主题");
        themeToggle.innerHTML = `
          <svg viewBox="0 0 20 20" fill="none" class="h-4 w-4" aria-hidden="true">
            <path d="M13.8 13.8a6.5 6.5 0 1 1-7.6-7.6 5.5 5.5 0 1 0 7.6 7.6Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
        `;
      } else {
        themeToggle.title = "切换浅色主题";
        themeToggle.setAttribute("aria-label", "切换浅色主题");
        themeToggle.innerHTML = `
          <svg viewBox="0 0 20 20" fill="none" class="h-4 w-4" aria-hidden="true">
            <circle cx="10" cy="10" r="3.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10 2.5v2M10 15.5v2M2.5 10h2M15.5 10h2M4.7 4.7l1.4 1.4M13.9 13.9l1.4 1.4M15.3 4.7l-1.4 1.4M6.1 13.9l-1.4 1.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        `;
      }
    }

    function applyTheme(theme) {
      const next = theme === "light" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      frame.style.backgroundColor = next === "light" ? "#faf9f5" : "#2f3348";
      setThemeIcon(next);
      applyThemeToFrame(next);
      try { localStorage.setItem(THEME_KEY, next); } catch (_) {}
    }

    function setActiveBySrc(src) {
      for (const a of navLinks) {
        const isActive = a.getAttribute("data-src") === src;
        a.dataset.active = isActive ? "true" : "false";
      }
    }

    function navigate(a) {
      const src = a.getAttribute("data-src") || a.getAttribute("href");
      const current = normalizeSrc(frame.getAttribute("src") || frame.src);
      const next = normalizeSrc(src);
      if (current === next) {
        setActiveBySrc(src);
        return;
      }
      activeNavTitle = (a.textContent || "").trim();
      if (frameMask) frameMask.style.opacity = "1";
      frame.src = src;
      setActiveBySrc(src);
      try {
        localStorage.setItem(LAST_PAGE_KEY, src);
      } catch (_) {}
    }

    for (const a of navLinks) {
      a.addEventListener("click", (e) => {
        // Keep it working even under file:// by using iframe navigation.
        e.preventDefault();
        navigate(a);
        closeDrawer();
      });
    }

    // Initial active state (restore last visited page if available)
    let initialSrc = frame.getAttribute("src");
    try {
      const saved = localStorage.getItem(LAST_PAGE_KEY);
      if (saved) {
        frame.src = saved;
        initialSrc = saved;
      }
    } catch (_) {}
    setActiveBySrc(initialSrc);
    const initialActive = navLinks.find((a) => a.getAttribute("data-src") === initialSrc);
    activeNavTitle = (initialActive?.textContent || "").trim();

    restoreNavGroupState();
    document.getElementById("sidebarNav")?.addEventListener("toggle", onNavGroupToggle, true);
    document.getElementById("drawerNav")?.addEventListener("toggle", onNavGroupToggle, true);

    function cleanupLoadedPage() {
      try {
        const doc = frame.contentDocument;
        if (!doc) return;
        doc.querySelectorAll(".page-updated").forEach((el) => el.remove());
        const h1 = doc.querySelector("h1");
        if (h1 && activeNavTitle) {
          h1.textContent = activeNavTitle;
          h1.style.textAlign = "center";
        }
        try {
          if (frame.src) {
            const u = new URL(frame.src, window.location.href);
            if (u.origin === window.location.origin) {
              localStorage.setItem(LAST_PAGE_KEY, `${u.pathname}${u.search}${u.hash}`);
            }
          }
        } catch (_) {}
        applyThemeToFrame(document.documentElement.getAttribute("data-theme") || "dark");
        if (frameMask) {
          requestAnimationFrame(() => {
            frameMask.style.opacity = "0";
          });
        }
      } catch (_) {
        // ignore cross-origin/permission issues
      }
    }

    frame.addEventListener("load", cleanupLoadedPage);

    // Split-pane resizing (desktop)
    (function initSplitPane() {
      if (!splitRoot || !splitter || !sidebar) return;

      const MIN = 200;
      const MAX = 460;
      const KEY = "notes.sidebarWidth";

      function clamp(n) {
        return Math.max(MIN, Math.min(MAX, n));
      }

      function applyWidth(px) {
        const w = clamp(px);
        splitRoot.style.setProperty("--sidebar-w", `${w}px`);
        try { localStorage.setItem(KEY, String(w)); } catch (_) {}
      }

      try {
        const saved = Number(localStorage.getItem(KEY));
        if (Number.isFinite(saved) && saved > 0) applyWidth(saved);
      } catch (_) {}

      let dragging = false;

      function pointerDown(e) {
        dragging = true;
        splitter.setPointerCapture?.(e.pointerId);
        document.body.style.userSelect = "none";
        document.body.style.cursor = "col-resize";
      }

      function pointerMove(e) {
        if (!dragging) return;
        const rect = splitRoot.getBoundingClientRect();
        const next = e.clientX - rect.left;
        applyWidth(next);
      }

      function pointerUp(e) {
        if (!dragging) return;
        dragging = false;
        splitter.releasePointerCapture?.(e.pointerId);
        document.body.style.userSelect = "";
        document.body.style.cursor = "";
      }

      splitter.addEventListener("pointerdown", pointerDown);
      window.addEventListener("pointermove", pointerMove);
      window.addEventListener("pointerup", pointerUp);

      splitter.addEventListener("keydown", (e) => {
        const current = sidebar.getBoundingClientRect().width;
        if (e.key === "ArrowLeft") applyWidth(current - 16);
        if (e.key === "ArrowRight") applyWidth(current + 16);
      });
    })();

    // Mobile drawer
    const navToggle = document.getElementById("navToggle");
    const drawer = document.getElementById("mobileDrawer");
    const drawerClose = document.getElementById("drawerClose");
    const drawerBackdrop = document.getElementById("drawerBackdrop");

    function openDrawer() {
      if (!drawer) return;
      drawer.classList.remove("hidden");
      document.body.style.overflow = "hidden";
    }
    function closeDrawer() {
      if (!drawer) return;
      drawer.classList.add("hidden");
      document.body.style.overflow = "";
    }

    if (navToggle) navToggle.addEventListener("click", openDrawer);
    if (drawerClose) drawerClose.addEventListener("click", closeDrawer);
    if (drawerBackdrop) drawerBackdrop.addEventListener("click", closeDrawer);

    const savedTheme = (() => {
      try {
        return localStorage.getItem(THEME_KEY);
      } catch (_) {
        return null;
      }
    })();
    applyTheme(savedTheme === "light" ? "light" : "dark");
    if (themeToggle) {
      themeToggle.addEventListener("click", () => {
        const current = document.documentElement.getAttribute("data-theme");
        applyTheme(current === "light" ? "dark" : "light");
      });
    }

    // Batch expand/collapse nav groups（桌面与抽屉同步，并持久化）
    function setNavGroupsOpen(_containerSelector, isOpen) {
      document.querySelectorAll("#sidebarNav details.nav-group, #drawerNav details.nav-group").forEach((el) => {
        el.open = isOpen;
      });
      persistNavGroupState();
    }

    document.querySelectorAll("[data-nav-action]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const action = btn.getAttribute("data-nav-action");
        const target = btn.getAttribute("data-nav-target");
        if (!target) return;
        setNavGroupsOpen(target, action === "expand");
      });
    });
  </script>
</body>
</html>
